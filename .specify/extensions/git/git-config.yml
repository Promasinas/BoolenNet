# Git Auto-Commit Configuration
# Auto-commit after each Spec Kit command

branch_numbering: sequential

auto_commit:
  default: true
  before_specify:
    enabled: true
    message: "[Spec Kit] Save progress before specification"
  after_specify:
    enabled: true
    message: "[Spec Kit] Add specification"
  before_clarify:
    enabled: true
    message: "[Spec Kit] Save progress before clarification"
  after_clarify:
    enabled: true
    message: "[Spec Kit] Clarify specification"
  before_plan:
    enabled: true
    message: "[Spec Kit] Save progress before planning"
  after_plan:
    enabled: true
    message: "[Spec Kit] Add implementation plan"
  before_tasks:
    enabled: true
    message: "[Spec Kit] Save progress before task generation"
  after_tasks:
    enabled: true
    message: "[Spec Kit] Add tasks"
  before_implement:
    enabled: true
    message: "[Spec Kit] Save progress before implementation"
  after_implement:
    enabled: true
    message: "[Spec Kit] Implementation progress"
  after_constitution:
    enabled: true
    message: "[Spec Kit] Update project constitution"
  after_checklist:
    enabled: true
    message: "[Spec Kit] Add checklist"
  after_analyze:
    enabled: true
    message: "[Spec Kit] Add analysis report"
